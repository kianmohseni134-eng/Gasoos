<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>بازی جاسوس | ساخته شده توسط کیان</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
      font-family: 'Segoe UI', 'Poppins', 'Vazirmatn', system-ui, -apple-system, 'Roboto', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .game-wrapper {
      max-width: 550px;
      width: 100%;
      margin: 0 auto;
    }

    .card {
      background: rgba(18, 25, 45, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 1.8rem 1.5rem;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease;
      animation: fadeUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1, h2, h3 {
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    h1 {
      font-size: 2.2rem;
      background: linear-gradient(135deg, #F2C94C, #F2994A);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    h2 {
      font-size: 1.6rem;
      color: #f0f3fa;
      border-right: 4px solid #f5b042;
      padding-right: 0.75rem;
      margin-bottom: 1.2rem;
    }

    h3 {
      color: #cdd9ff;
      margin-bottom: 1rem;
      font-size: 1.2rem;
    }

    .players-selector {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      align-items: center;
    }

    .counter-group {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      background: #0f1422cc;
      padding: 0.8rem 1.5rem;
      border-radius: 60px;
      width: fit-content;
      margin: 0 auto;
    }

    .counter-btn {
      background: #1e2a3e;
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 60px;
      font-size: 2rem;
      font-weight: bold;
      color: #ffcd7e;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
    }

    .counter-btn:active {
      transform: scale(0.94);
      background: #2a3b4e;
    }

    #playerCount {
      font-size: 2rem;
      font-weight: 800;
      min-width: 70px;
      text-align: center;
      color: #ffde9c;
    }

    .btn-primary {
      background: linear-gradient(95deg, #f0a34b, #ff7700);
      border: none;
      padding: 14px 28px;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 60px;
      color: #0e1a2b;
      width: 100%;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 8px 20px rgba(245, 158, 11, 0.3);
      letter-spacing: 0.5px;
    }

    .btn-primary:active {
      transform: scale(0.97);
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
    }

    .btn-secondary {
      background: rgba(48, 61, 89, 0.9);
      border: 1px solid rgba(255, 200, 100, 0.4);
      padding: 12px 18px;
      border-radius: 40px;
      color: #ffdd99;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .btn-secondary:active {
      background: #2a3a55;
    }

    .players-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
      margin: 1.8rem 0;
    }

    .player-card {
      background: #0e1629dd;
      border-radius: 1.5rem;
      padding: 0.9rem 0.5rem;
      text-align: center;
      transition: all 0.2s;
      border: 1px solid #2d3a5e;
      backdrop-filter: blur(4px);
    }

    .player-name {
      font-weight: 700;
      font-size: 1.1rem;
      color: #f3e7c9;
      margin-bottom: 10px;
    }

    .role-btn {
      background: #ffb34730;
      border: 1px solid #f5a742;
      color: #ffddb0;
      padding: 8px 12px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.15s;
      width: 100%;
    }

    .role-btn:active {
      background: #ffb34770;
      transform: scale(0.96);
    }

    .voting-area {
      background: #0a1022aa;
      border-radius: 1.5rem;
      padding: 1.2rem;
      margin-top: 1rem;
    }

    .current-voter {
      background: #1f293f;
      padding: 0.8rem;
      border-radius: 40px;
      text-align: center;
      margin-bottom: 1.5rem;
      font-weight: bold;
      font-size: 1.2rem;
    }

    .vote-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin: 1rem 0;
    }

    .vote-target {
      background: #212d49;
      border: none;
      padding: 10px 16px;
      border-radius: 60px;
      font-weight: 600;
      color: #fae6c3;
      cursor: pointer;
      transition: 0.1s;
      font-size: 0.9rem;
    }

    .vote-target:active {
      background: #d9822b;
      color: #0b0f1c;
    }

    .votes-summary {
      background: #050a16a0;
      border-radius: 1.2rem;
      padding: 0.8rem;
      margin-top: 1.2rem;
    }

    .vote-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 12px;
      border-bottom: 1px solid #2f3b5a;
    }

    .result-players-list {
      margin: 1rem 0;
      max-height: 320px;
      overflow-y: auto;
    }

    .result-item {
      background: #0f182bc9;
      margin: 8px 0;
      padding: 12px;
      border-radius: 30px;
      display: flex;
      justify-content: space-between;
      font-weight: 500;
    }

    .badge-spy {
      background: #c44536;
      padding: 4px 14px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
    }

    .badge-citizen {
      background: #2a6f4f;
      padding: 4px 14px;
      border-radius: 40px;
    }

    .winner-text {
      text-align: center;
      font-size: 1.7rem;
      font-weight: 800;
      margin: 15px 0;
      background: linear-gradient(120deg, gold, #ffa559);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s ease;
    }

    .modal.active {
      visibility: visible;
      opacity: 1;
    }

    .modal-content {
      background: #111a2b;
      border-radius: 2rem;
      padding: 2rem 1.8rem;
      max-width: 280px;
      width: 80%;
      text-align: center;
      border: 1px solid #ffb347;
      box-shadow: 0 25px 40px black;
      animation: scaleIn 0.2s cubic-bezier(0.2, 1.2, 0.4, 1);
    }

    @keyframes scaleIn {
      from {
        transform: scale(0.9);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .modal-word {
      font-size: 1.8rem;
      font-weight: 800;
      margin: 20px 0;
      background: #ffcf7a;
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      word-break: break-word;
    }

    .close-modal {
      background: #f0a34b;
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: bold;
      margin-top: 15px;
      cursor: pointer;
    }

    .spacer {
      height: 1rem;
    }

    button {
      font-family: inherit;
    }

    .footer-credit {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.75rem;
      color: #6b7c9e;
      border-top: 1px solid #2a3453;
      padding-top: 1rem;
      letter-spacing: 0.3px;
    }

    @media (max-width: 480px) {
      .card {
        padding: 1.2rem;
      }
      .players-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      }
    }
  </style>
</head>
<body>
<div class="game-wrapper" id="appRoot">
  <!-- صفحه شروع -->
  <div id="startScreen" class="card">
    <h1>🕵️‍♂️ جاسوس 🕵️‍♀️</h1>
    <p style="text-align: center; color: #aab7e6; margin-bottom: 2rem;">بازی شرکتی مخفی و هیجان‌انگیز</p>
    <div class="players-selector">
      <div class="counter-group">
        <button class="counter-btn" id="decrementPlayer">–</button>
        <span id="playerCount">4</span>
        <button class="counter-btn" id="incrementPlayer">+</button>
      </div>
      <button class="btn-primary" id="startGameBtn">🎲 شروع بازی 🎲</button>
    </div>
    <div class="spacer"></div>
    <div style="font-size: 0.75rem; text-align: center; color: #6b7c9e;">تعداد بازیکنان: ۳ تا ۱۲ نفر</div>
    <div class="footer-credit">🎮 ساخته شده توسط <strong style="color:#f5a742;">کیان</strong> | بازی جاسوس</div>
  </div>

  <!-- صفحه اصلی بازی (شامل نقش‌ها و رأی‌گیری و نتیجه) -->
  <div id="gameContainer" style="display: none;">
    <div id="roleRevealSection" class="card">
      <h2>🔍 نمایش نقش</h2>
      <p style="color:#bdd4ff; margin-bottom: 10px;">هر بازیکن گوشی را بگیرد و دکمه «مشاهده نقش» را بزند</p>
      <div id="playersRoleList" class="players-grid"></div>
      <button id="goToVotingBtn" class="btn-primary" style="margin-top: 20px;">🗳️ مرحله رأی‌گیری 🗳️</button>
      <button id="restartFromRoleBtn" class="btn-secondary" style="margin-top: 12px; width:100%">🔄 بازی جدید</button>
      <div class="footer-credit" style="margin-top: 1rem;">✨ ساخته شده توسط کیان ✨</div>
    </div>

    <div id="votingSection" style="display: none;">
      <div class="card">
        <h2>🗳️ رأی‌گیری</h2>
        <div id="votingDynamicArea"></div>
        <button id="restartFromVoteBtn" class="btn-secondary" style="margin-top: 20px; width:100%">🔄 صفحه اصلی</button>
        <div class="footer-credit" style="margin-top: 1rem;">⚡ طراح: کیان</div>
      </div>
    </div>

    <div id="resultSection" style="display: none;">
      <div class="card">
        <h2>🏆 پایان بازی</h2>
        <div id="resultContent"></div>
        <button id="newGameFromResultBtn" class="btn-primary" style="margin-top: 20px;">✨ بازی جدید ✨</button>
        <div class="footer-credit" style="margin-top: 1rem;">🎯 ساخته شده توسط کیان | جاسوس</div>
      </div>
    </div>
  </div>
</div>

<!-- مودال نمایش نقش -->
<div id="roleModal" class="modal">
  <div class="modal-content">
    <div id="modalRoleText" style="font-size: 1.3rem; font-weight: bold;">نقش شما</div>
    <div id="modalSecretInfo" class="modal-word">-</div>
    <button class="close-modal" id="closeModalBtn">متوجه شدم</button>
  </div>
</div>

<script>
  // ---------------------------------- کلمات مخفی (لیست فارسی) ----------------------------------
  const WORD_POOL = [
    "🍎 سیب", "📚 کتاب", "🚗 ماشین", "🏔️ کوه", "🌊 دریا", "🌕 ماه", "☀️ خورشید", 
    "🎸 گیتار", "✈️ هواپیما", "💻 لپ‌تاپ", "🏀 بسکتبال", "🍕 پیتزا", "🐈 گربه", "👑 تاج"
  ];

  // متغیرهای سراسری بازی
  let currentGame = {
    players: [],           
    secretWord: "",
    spyIndex: -1,
    phase: "setup",       
    votes: [],            
    currentVoterIdx: 0,   
    votingFinished: false
  };

  // عناصر DOM
  const startScreenDiv = document.getElementById('startScreen');
  const gameContainer = document.getElementById('gameContainer');
  const roleRevealDiv = document.getElementById('roleRevealSection');
  const votingSectionDiv = document.getElementById('votingSection');
  const resultSectionDiv = document.getElementById('resultSection');
  const playersRoleListDiv = document.getElementById('playersRoleList');
  const votingDynamicArea = document.getElementById('votingDynamicArea');
  const resultContentDiv = document.getElementById('resultContent');

  const modal = document.getElementById('roleModal');
  const modalSecretInfo = document.getElementById('modalSecretInfo');
  const closeModalBtn = document.getElementById('closeModalBtn');

  // کنترل تعداد بازیکنان
  let selectedPlayerCount = 4;
  const playerCountSpan = document.getElementById('playerCount');
  const decBtn = document.getElementById('decrementPlayer');
  const incBtn = document.getElementById('incrementPlayer');
  const startGameBtn = document.getElementById('startGameBtn');

  function updatePlayerCountUI() {
    playerCountSpan.innerText = selectedPlayerCount;
  }
  decBtn.addEventListener('click', () => {
    if (selectedPlayerCount > 3) selectedPlayerCount--;
    updatePlayerCountUI();
  });
  incBtn.addEventListener('click', () => {
    if (selectedPlayerCount < 12) selectedPlayerCount++;
    updatePlayerCountUI();
  });

  // --------------------- شروع بازی (ایجاد بازیکنان، انتخاب جاسوس و کلمه) ---------------------
  function initNewGame(numberOfPlayers) {
    const playersList = [];
    for (let i = 1; i <= numberOfPlayers; i++) {
      playersList.push({
        id: i-1,
        name: `بازیکن ${i}`,
        isSpy: false,
      });
    }
    // انتخاب تصادفی جاسوس
    const spyIdx = Math.floor(Math.random() * numberOfPlayers);
    playersList[spyIdx].isSpy = true;
    
    // انتخاب کلمه تصادفی
    const randomWord = WORD_POOL[Math.floor(Math.random() * WORD_POOL.length)];
    
    currentGame = {
      players: playersList,
      secretWord: randomWord,
      spyIndex: spyIdx,
      phase: "roleReveal",
      votes: new Array(numberOfPlayers).fill(0),
      currentVoterIdx: 0,
      votingFinished: false
    };
  }

  // رندر بخش نمایش نقش (دکمه مشاهده نقش برای هر بازیکن)
  function renderRoleReveal() {
    if (!playersRoleListDiv) return;
    playersRoleListDiv.innerHTML = '';
    currentGame.players.forEach((player, idx) => {
      const playerCard = document.createElement('div');
      playerCard.className = 'player-card';
      playerCard.innerHTML = `
        <div class="player-name">${player.name}</div>
        <button class="role-btn" data-player-idx="${idx}">🕵️ مشاهده نقش</button>
      `;
      playersRoleListDiv.appendChild(playerCard);
    });
    document.querySelectorAll('.role-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const playerIdx = parseInt(btn.getAttribute('data-player-idx'));
        showRoleForPlayer(playerIdx);
      });
    });
  }

  // نمایش نقش در مودال (برای هر بازیکن)
  function showRoleForPlayer(playerIdx) {
    const player = currentGame.players[playerIdx];
    if (!player) return;
    let displayText = "";
    let secretInfo = "";
    if (player.isSpy) {
      displayText = "🕶️ تو جاسوس هستی!";
      secretInfo = "🤫 مأمور مخفی";
    } else {
      displayText = "🔎 کلمه مخفی:";
      secretInfo = `${currentGame.secretWord}`;
    }
    modalSecretInfo.innerHTML = player.isSpy ? "🚨 تو جاسوس هستی! 🚨" : `🔐 ${currentGame.secretWord}`;
    document.getElementById('modalRoleText').innerHTML = player.isSpy ? "🕵️‍♂️ نقش شما : جاسوس" : "👥 نقش شما : شهروند";
    modal.classList.add('active');
  }

  closeModalBtn.addEventListener('click', () => {
    modal.classList.remove('active');
  });
  modal.addEventListener('click', (e) => {
    if (e.target === modal) modal.classList.remove('active');
  });

  // ---------- مرحله رأی‌گیری (رندر پویا و مدیریت نوبت) ----------
  let currentVoterDisplayLock = false;

  function renderVotingPhase() {
    if (!votingDynamicArea) return;
    const players = currentGame.players;
    const totalPlayers = players.length;
    const currentVoter = currentGame.currentVoterIdx;
    
    if (currentGame.currentVoterIdx >= totalPlayers) {
      finishVotingAndShowResult();
      return;
    }
    
    const voterName = players[currentVoter].name;
    const votesSoFar = [...currentGame.votes];
    
    let html = `
      <div class="voting-area">
        <div class="current-voter">
          📢 نوبت رأی‌گیری: <span style="color:#ffbc6e;">${voterName}</span>
        </div>
        <p style="margin-bottom: 8px;">به چه کسی رأی می‌دهید؟ (جاسوس احتمالی)</p>
        <div class="vote-buttons" id="voteButtonsContainer"></div>
        <div class="votes-summary">
          <h3>📊 آرای فعلی</h3>
    `;
    
    for (let i = 0; i < players.length; i++) {
      html += `<div class="vote-row"><span>${players[i].name}</span><span><strong>${votesSoFar[i]}</strong> رأی</span></div>`;
    }
    html += `</div></div>`;
    votingDynamicArea.innerHTML = html;
    
    const voteContainer = document.getElementById('voteButtonsContainer');
    if (voteContainer) {
      players.forEach((targetPlayer, tIdx) => {
        if (tIdx === currentVoter) return;
        const voteBtn = document.createElement('button');
        voteBtn.className = 'vote-target';
        voteBtn.innerText = `🎯 ${targetPlayer.name}`;
        voteBtn.addEventListener('click', (e) => {
          if (currentGame.phase !== 'voting') return;
          if (currentGame.currentVoterIdx >= totalPlayers) return;
          if (currentVoterDisplayLock) return;
          currentVoterDisplayLock = true;
          
          currentGame.votes[tIdx] += 1;
          currentGame.currentVoterIdx += 1;
          
          if (currentGame.currentVoterIdx >= totalPlayers) {
            finishVotingAndShowResult();
          } else {
            renderVotingPhase();
          }
          currentVoterDisplayLock = false;
        });
        voteContainer.appendChild(voteBtn);
      });
      
      if (voteContainer.children.length === 0) {
        const warningMsg = document.createElement('p');
        warningMsg.innerText = 'هیچ بازیکن دیگری برای رأی دادن وجود ندارد!';
        voteContainer.appendChild(warningMsg);
      }
    }
  }
  
  // اتمام رأی‌گیری و نمایش نتیجه
  function finishVotingAndShowResult() {
    if (currentGame.phase === 'result') return;
    currentGame.phase = 'result';
    const players = currentGame.players;
    const votes = currentGame.votes;
    const spyIdx = currentGame.spyIndex;
    
    let maxVotes = -1;
    let playersWithMax = [];
    for (let i = 0; i < votes.length; i++) {
      if (votes[i] > maxVotes) {
        maxVotes = votes[i];
        playersWithMax = [i];
      } else if (votes[i] === maxVotes) {
        playersWithMax.push(i);
      }
    }
    
    const spyGotMostVotes = playersWithMax.includes(spyIdx) && (maxVotes > 0) && (playersWithMax.length === 1);
    let winnerMessage = "";
    if (spyGotMostVotes) {
      winnerMessage = "🎉 شهروندان پیروز شدند! جاسوس دستگیر شد. 🎉";
    } else {
      winnerMessage = "💀 جاسوس پیروز شد! شهروندان نتوانستند جاسوس را پیدا کنند. 💀";
    }
    
    let rolesHtml = `<div class="result-players-list">`;
    players.forEach((p, idx) => {
      let roleDesc = p.isSpy ? "🕵️‍♂️ جاسوس" : `👤 شهروند (کلمه: ${currentGame.secretWord})`;
      let badgeClass = p.isSpy ? "badge-spy" : "badge-citizen";
      rolesHtml += `
        <div class="result-item">
          <span>${p.name}</span>
          <span class="${badgeClass}">${roleDesc}</span>
        </div>
      `;
    });
    rolesHtml += `</div>`;
    
    const finalHtml = `
      <div class="winner-text">${winnerMessage}</div>
      <h3 style="margin: 15px 0 8px;">📋 نقش بازیکنان:</h3>
      ${rolesHtml}
      <div style="margin-top: 16px; background:#00000040; border-radius: 20px; padding: 12px; text-align:center;">
        📌 کلمه مخفی: <strong style="color:#ffbc6e;">${currentGame.secretWord}</strong>
      </div>
    `;
    resultContentDiv.innerHTML = finalHtml;
    
    roleRevealDiv.style.display = 'none';
    votingSectionDiv.style.display = 'none';
    resultSectionDiv.style.display = 'block';
  }
  
  // ---------- انتقال از نقش به رأی‌گیری ----------
  function goToVotingPhase() {
    if (currentGame.phase !== 'roleReveal') return;
    currentGame.votes = new Array(currentGame.players.length).fill(0);
    currentGame.currentVoterIdx = 0;
    currentGame.phase = 'voting';
    currentGame.votingFinished = false;
    
    roleRevealDiv.style.display = 'none';
    votingSectionDiv.style.display = 'block';
    resultSectionDiv.style.display = 'none';
    
    renderVotingPhase();
  }
  
  // ------------------------------------- شروع کامل بازی از صفحه اصلی ---------------------------------
  function launchGame() {
    const playerNum = selectedPlayerCount;
    initNewGame(playerNum);
    startScreenDiv.style.display = 'none';
    gameContainer.style.display = 'block';
    roleRevealDiv.style.display = 'block';
    votingSectionDiv.style.display = 'none';
    resultSectionDiv.style.display = 'none';
    
    renderRoleReveal();
    currentGame.phase = 'roleReveal';
  }
  
  function resetToStart() {
    startScreenDiv.style.display = 'block';
    gameContainer.style.display = 'none';
    roleRevealDiv.style.display = 'block';
    votingSectionDiv.style.display = 'none';
    resultSectionDiv.style.display = 'none';
    modal.classList.remove('active');
    currentGame = { players: [], secretWord: "", spyIndex: -1, phase: "setup", votes: [], currentVoterIdx: 0 };
  }
  
  startGameBtn.addEventListener('click', launchGame);
  document.getElementById('goToVotingBtn').addEventListener('click', () => {
    if (currentGame.phase === 'roleReveal') goToVotingPhase();
  });
  document.getElementById('restartFromRoleBtn').addEventListener('click', resetToStart);
  document.getElementById('restartFromVoteBtn').addEventListener('click', resetToStart);
  document.getElementById('newGameFromResultBtn').addEventListener('click', resetToStart);
  
  window.addEventListener('load', () => {
    updatePlayerCountUI();
    startScreenDiv.style.display = 'block';
    gameContainer.style.display = 'none';
  });
</script>
</body>
  </html>
